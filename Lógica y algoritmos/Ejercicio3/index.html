<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Ejercicio3/img/caja.png" type="image/png">
    <title>Inventario tienda</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tu Inventario</h1>
            <p>Administra tu negocio de forma inteligente</p>
        </header>

        <main>
            <!-- Filter Controls -->
            <section class="filter-section">
                <h2>Filtrar productos</h2>
                <div class="filter-controls">
                    <div class="filter-group">
                        <label>Filtrar por precio:</label>
                        <div class="price-buttons">
                            <button class="filter-btn active" data-filter="all">Todo</button>
                            <button class="filter-btn" data-filter="under500">Menor a $500</button>
                            <button class="filter-btn" data-filter="under1500">Menor a $1500</button>
                            <button class="filter-btn" data-filter="over1500">De $1500 y más</button>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Ordenar por:</label>
                        <div class="sort-buttons">
                            <button class="sort-btn active" data-sort="name">Nombre (A-Z)</button>
                            <button class="sort-btn" data-sort="price-low">Precio (Menor a mayor)</button>
                            <button class="sort-btn" data-sort="price-high">Precio (Mayor a menor)</button>
                            <button class="sort-btn" data-sort="category">Categoría</button>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Categoría:</label>
                        <select id="categoryFilter" class="category-select">
                            <option value="all">Todas</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Products Display -->
            <section class="products-section">
                <div class="products-header">
                    <h2>Productos en inventario</h2>
                    <div id="resultsCount" class="results-count">Mostrando 0 productos</div>
                </div>
                <div id="productsList" class="products-grid">
                </div>
            </section>
        </main>

        <footer>
            <p>2026 - Todos los derechos reservados©</p>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
