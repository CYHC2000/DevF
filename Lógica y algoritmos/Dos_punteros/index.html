<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Pares por Inicial</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Organiza tus mesas de invitados</h2>
        
        <label>Ingresa los nombres de los invitados (uno por línea):</label>
        <textarea id="nombres" rows="6" placeholder= "Ejemplo:&#10;Sara Sánchez&#10;Manuel Martínez&#10;Carmen Cruz"></textarea>
        
        <div class="botones">
            <button id="btnBuscar">Buscar pareja</button>
            <button id="btnLimpiar">Limpiar</button>
        </div>
        
        <div id="resultadoLabel" class="resultado">
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
