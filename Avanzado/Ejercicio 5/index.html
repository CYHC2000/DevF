<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Eventos</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <h1>Registro de Evento</h1>
      <form id="eventForm">
        <div class="form-group">
          <label for="name" class="campo">Nombre completo</label>
          <input
            type="text"
            id="name"
            placeholder="Ingresa tu nombre"
            class="texto"
          >
          <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email"  class="campo">Correo electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="correo@ejemplo.com"
            class="texto"
          >
          <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="age"  class="campo">Edad</label>
          <input
            type="number"
            id="age"
            placeholder="Edad"
            class="texto"
          >
          <small class="error" id="ageError"></small>
        </div>

        <div class="form-group">
          <label class="titulos">Intereses</label>
          <div class="checkbox-group">
            <label class="intereses">
              <input type="checkbox" name="interest" value="Tecnología">
              Tecnología
            </label>
            <label class="intereses">
              <input type="checkbox" name="interest" value="Marketing">
              Marketing
            </label>
            <label class="intereses">
              <input type="checkbox" name="interest" value="Diseño">
              Diseño
            </label>
          </div>
          <small class="error" id="interestError"></small>
        </div>

        <div class="form-group">
          <label for="schedule" class="titulos">Horario</label>
          <select id="schedule">
            <option value="">Selecciona</option>
            <option value="mañana">Mañana</option>
            <option value="tarde">Tarde</option>
            <option value="noche">Noche</option>
          </select>
          <small class="error" id="scheduleError"></small>
        </div>


        <div class="form-group">
          <label for="document" class="titulos">
            Documento de identificación
          </label>
          <input
            type="file"
            id="document"
            class="documento"
          >
          <small class="error" id="documentError"></small>
        </div>

        <button type="submit">
          Registrarse
        </button>
      </form>
    </div>
    <script src="app.js"></script>

  </body>
</html>
