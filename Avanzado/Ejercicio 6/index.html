<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registro con Zod</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Librería Zod -->
  <script src="https://cdn.jsdelivr.net/npm/zod@3.22.4/lib/index.umd.min.js"></script>
</head>

<body>

  <div class="container">

    <h1>Formulario de Registro</h1>

    <form id="registerForm">

      <!-- Nombre -->
      <div class="form-group">

        <label for="name">
          Nombre
        </label>

        <input
          type="text"
          id="name"
          placeholder="Ingresa tu nombre"
        >

      </div>

      <!-- Correo -->
      <div class="form-group">

        <label for="email">
          Correo electrónico
        </label>

        <input
          type="email"
          id="email"
          placeholder="correo@ejemplo.com"
        >

      </div>

      <!-- Contraseña -->
      <div class="form-group">

        <label for="password">
          Contraseña
        </label>

        <input
          type="password"
          id="password"
          placeholder="********"
        >

      </div>

      <button type="submit">
        Registrarse
      </button>

    </form>

    <!-- Contenedor errores -->
    <div id="errors"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
