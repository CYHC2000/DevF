<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservas Restaurante</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="card">
        <h1>Reservar mesa</h1>
      <form id="formReserva">
        <div class="input-group">
          <input
            type="text"
            id="nombre"
            required
            placeholder=" "
          >
          <label>Nombre del cliente</label>
        </div>
        <div class="input-group">
          <input
            type="email"
            id = "correo"
            required
            placeholder=" "
          >
          <label>Correo de contacto</label>
        </div>
        <div class="input-group">
          <input
            type="number"
            id="mesas"
            min="1"
            required
            placeholder=" "
          >
          <label>Mesas solicitadas</label>
        </div>

        <button type="submit">
          Hacer reserva
        </button>

      </form>
    </div>

    <div class="logs">
      <h2>Estado</h2>
      <div id="resultado"></div>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
