<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner - Plan Your Next Adventure</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Travel Planner</h1>
            <p>Plan your next adventure!</p>
        </header>

        <main>
            <!-- Form to register destinations -->
            <section class="form-section">
                <h2>Register New Destination</h2>
                <form id="destinationForm">
                    <div class="form-group">
                        <label for="destination">Destination:</label>
                        <input type="text" id="destination" name="destination" required 
                               placeholder="e.g., Paris, France">
                    </div>

                    <div class="form-group">
                        <label for="date">Travel Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="transport">Transportation:</label>
                        <select id="transport" name="transport" required>
                            <option value="plane">Plane ✈️</option>
                            <option value="train">Train 🚂</option>
                            <option value="bus">Bus 🚌</option>
                            <option value="car">Car 🚗</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="nights">Number of Nights:</label>
                        <input type="number" id="nights" name="nights" min="1" max="30" value="3" required>
                    </div>

                    <div class="form-group">
                        <label for="people">Number of People:</label>
                        <input type="number" id="people" name="people" min="1" max="10" value="1" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Register Destination</button>
                </form>
            </section>

            <!-- Section to show itinerary -->
            <section class="itinerary-section">
                <h2>My Travel Itinerary</h2>
                <div id="itineraryList" class="itinerary-list">
                    <p class="empty-message">No destinations registered yet. Add your first destination!</p>
                </div>
            </section>

            <!-- Section to calculate total cost -->
            <section class="cost-section">
                <h2>Calculate Trip Cost</h2>
                <div class="cost-controls">
                    <select id="costDestination" class="cost-select">
                        <option value="">Select a destination</option>
                    </select>
                    <select id="costTransport" class="cost-select">
                        <option value="plane">Plane ✈️</option>
                        <option value="train">Train 🚂</option>
                        <option value="bus">Bus 🚌</option>
                        <option value="car">Car 🚗</option>
                    </select>
                    <button id="calculateBtn" class="btn btn-secondary">Calculate Cost</button>
                </div>
                <div id="costResult" class="cost-result"></div>
            </section>
        </main>

        <footer>
            <p>© 2024 Travel Planner - Plan your adventures wisely!</p>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
