<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Finder | Recursion Project</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>El regalo perfecto</h1>
            <p>¡Busca el regalo perfecto dentro de nuestras listas!</p>
        </header>
            <div class="gift-list-section">
                <h2>Lista de regalos:</h2>
                <ul id="giftList" class="gift-list"></ul>
            </div>

            <div class="search-section">
                <h3>Busca un regalo</h3>
                <div class="input-group">
                    <input type="text" id="giftInput" placeholder="Ingresa el nombre del regalo que buscas" autocomplete="off">
                    <button id="searchBtn" class="btn btn-primary">Buscar</button>
                </div>
                <div id="resultMessage" class="result-message"></div>
            </div>

            <div class="result-section">
                <span class="placeholder"></span>
            </div>

    </div>
    <script src="js/app.js"></script>
</body>
</html>
